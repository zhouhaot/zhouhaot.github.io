<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="VOID.DEV — 一个关于前端工程、创意交互与数字美学的个人博客">
  <meta name="theme-color" content="#0a0a14">
  <title>VOID.DEV</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

  <!-- Theme CSS is loaded dynamically by Core.loadTheme() -->

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body>

  <!-- Loading Screen -->
  <div class="loader" aria-hidden="true">
    <span class="loader__text">VOID.DEV</span>
  </div>

  <!-- Particle Background (used by cyberpunk theme) -->
  <canvas id="particle-canvas" aria-hidden="true"></canvas>

  <!-- Cursor Glow (used by cyberpunk theme) -->
  <div class="cursor-glow hidden" aria-hidden="true"></div>

  <!-- Navigation -->
  <nav class="nav" role="navigation" aria-label="Main navigation"></nav>

  <!-- Main Content -->
  <main id="main-content" role="main"></main>

  <!-- Article View -->
  <div id="article-view" style="display:none"></div>

  <!-- Scripts: Core framework first, then modules, then app -->
  <script src="js/core.js"></script>
  <script src="js/particles.js"></script>
  <script src="js/cursor.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/router.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
